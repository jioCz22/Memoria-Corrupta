<body>
    <div id="lobby-overlay" class="modal">
        <div class="modal-content">
            <h1 class="glitch-text">BIOLOGÍA</h1>
            <p>MEMORIA CORRUPTA</p>
            <button class="reload-btn" onclick="createRoom()">CREAR SALA</button>
            <p style="margin:10px 0; opacity:0.5;">— O —</p>
            <input type="text" id="input-room" placeholder="CÓDIGO" maxlength="6">
            <button class="reload-btn" style="border-color:var(--accent2);" onclick="joinRoom()">UNIRSE</button>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <header>
            <h1 id="main-title">BIOLOGÍA</h1>
            <p id="room-info">SALA: ------</p>
        </header>

        <div class="ui-container">
            <div id="p1-ui" class="player-box">
                <div class="player-header">J1 🧬</div>
                <div class="stats">Pts: <span id="score1">0</span> | <span id="timer1">02:00</span></div>
            </div>
            <div id="p2-ui" class="player-box">
                <div class="player-header">J2 🔬</div>
                <div class="stats">Pts: <span id="score2">0</span> | <span id="timer2">02:00</span></div>
            </div>
        </div>

        <main id="game-board" class="grid-container"></main>
    </div>

    <div id="win-modal" class="modal hidden">
        <div class="modal-content">
            <h2>SISTEMA RESTAURADO</h2>
            <p id="grand-winner-name">GANADOR: --</p>
            <button class="reload-btn" onclick="location.reload()">REINICIAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
