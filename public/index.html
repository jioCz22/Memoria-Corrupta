<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOS CORRUPTOS | Bio-Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="lobby-overlay">
        <header>
            <h1 class="glitch-text">LOS CORRUPTOS</h1>
            <div class="lobby-controls">
                <button class="reload-btn" onclick="createRoom()">CREAR SALA</button>
                <p>— O —</p>
                <input type="text" id="input-room" placeholder="CÓDIGO" maxlength="6">
                <button class="reload-btn" style="border-color:var(--accent2); color:var(--accent2);" onclick="joinRoom()">UNIRSE</button>
            </div>
        </header>
    </div>

    <div class="game-header">
        <h2 id="main-title">BIOLOGÍA</h2>
        <p id="room-info">ESPERANDO SALA...</p>
    </div>

    <div class="ui-container">
        <div id="p1-ui" class="player-box">
            <div class="player-header">J1 🧬</div>
            <div class="stats">
                Puntos: <span id="score1">0</span>
                <div class="timer-box">⏳ <span id="timer1">02:00</span></div>
            </div>
        </div>

        <div id="p2-ui" class="player-box">
            <div class="player-header">J2 🔬</div>
            <div class="stats">
                Puntos: <span id="score2">0</span>
                <div class="timer-box">⏳ <span id="timer2">02:00</span></div>
            </div>
        </div>
    </div>

    <main id="game-board" class="grid-container hidden">
        </main>

    <div id="win-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="glitch-text">SISTEMA RESTAURADO</h2>
            <p id="grand-winner-name">GANADOR: --</p>
            <button class="reload-btn" onclick="location.reload()">REINICIAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
