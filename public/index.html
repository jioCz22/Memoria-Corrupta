<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biologia - Memorama</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bio-background"></div>
    <script src="/socket.io/socket.io.js"></script>

    <div class="main-wrapper">
        <header>
            <h1 class="glitch" data-text="BIOGENIX 3D">BIOLOGIA</h1>
            <p id="room-info">Nosotros le sabemos profe</p>
        </header>

        <div class="ui-container">
            <div class="player-box p1 active" id="p1-ui">
                <div class="player-header">J1 🧬</div>
                <div class="stats">
                    <span id="score1">0</span> | <span class="timer" id="timer1">00:00</span>
                </div>
            </div>
            
            <div class="center-ui">
                <div id="game-info" class="hidden">🔬 <span id="pairs-left">22</span></div>
            </div>

            <div class="player-box p2" id="p2-ui">
                <div class="player-header">J2 🔬</div>
                <div class="stats">
                    <span id="score2">0</span> | <span class="timer" id="timer2">00:00</span>
                </div>
            </div>
        </div>

        <main id="game-board" class="grid-container hidden"></main>
    </div>

    <div id="win-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="grand-winner-name">COMPLETADA</h2>
            <button class="reload-btn" onclick="location.reload()">REINTENTAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
